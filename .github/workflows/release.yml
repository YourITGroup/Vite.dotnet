name: Vite.dotnet - Release

on:
  push:
    branches: [ release/* ]

env:
  PROJECT: Vite.dotnet/Vite.dotnet.csproj
  OUTPUT_PATH: ./build-out/
  
jobs:
  publish-nuget:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # enable GitHub OIDC token issuance for this job

    environment: release

    strategy:
      matrix:
        dotnet-version: ['10.x']

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup .NET Core SDK ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4

      with:
        dotnet-version: ${{ matrix.dotnet-version }}
  
    - name: Get Release Version
      id: package_version
      uses: KageKirin/get-csproj-version@v1
      with:
        file: ${{ env.PROJECT }}
        regex: ^(?<major>0|[1-9]\d*)\.(?<minor>0|[1-9]\d*)\.(?<patch>0|[1-9]\d*)(?:-(?<prerelease>(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+(?<buildmetadata>[0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$

    - name: Check Version v${{ steps.package_version.outputs.version }} Pre-Release state
      id: check_prerelease
      run: |
        if [[ ${{ steps.package_version.outputs.version }} =~ ^[0-9]+\.[0-9]+\.[0-9]+-.+$ ]]; then
          echo "Pre-Release detected"
          echo "prerelease=true" >> $GITHUB_OUTPUT
        else
          echo "Pre-Release NOT detected"
          echo "prerelease=false" >> $GITHUB_OUTPUT
        fi
  
    - name: Build
      run: dotnet build ${{ env.PROJECT }} --configuration Release
        
    - name: Create the package
      run: dotnet pack ${{ env.PROJECT }} --no-build --no-restore --configuration Release -o ${{ env.OUTPUT_PATH }}
      
  # Get a short-lived NuGet API key
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }} # Recommended: use a secret like ${{ secrets.NUGET_USER }} for your nuget.org username (profile name), NOT your email address
  
    # Push the package
    - name: NuGet push
      run: dotnet nuget push ${{ env.OUTPUT_PATH }}*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
    - name: Publish to NuGet
      run: dotnet nuget push ${{ env.OUTPUT_PATH }}*.nupkg -s https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{ secrets.NUGET_API_KEY }}

    - uses: avakar/tag-and-release@v1
      name: Create Release Tag v${{ steps.package_version.outputs.version }}
      id: release
      with:
        tag_name: v${{ steps.package_version.outputs.version }}
        prerelease: ${{ steps.check_prerelease.outputs.prerelease }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Release information for v${{ steps.package_version.outputs.version }}
      run: |
        echo Release Id: ${{ steps.release.outputs.id }}
        echo Upload URL: ${{ steps.release.outputs.upload_url }}
        echo Release URL: ${{ steps.release.outputs.html_url }}

